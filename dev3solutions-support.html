<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>الدعم الفني</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, "Cairo", sans-serif;
      background: #f8f8f8;
      direction: rtl;
      margin: 0;
      padding: 20px;
      color: #1B1620;
    }

    .card {
      max-width: 700px;
      margin: 30px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #074F60;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .email-container {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .email-link {
      color: #074F60;
      text-decoration: none;
      font-weight: bold;
      word-break: break-all;
      font-size: 17px;
    }

    .copy-btn {
      background: #074F60;
      color: #ffffff;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .copy-btn:hover {
      background: #053a47;
    }

    @media (max-width: 480px) {

      body {
        padding: 12px;
      }

      .card {
        padding: 22px;
      }

      h1 {
        font-size: 24px;
      }

      p {
        font-size: 16px;
      }

      .copy-btn {
        font-size: 13px;
        padding: 7px 12px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>الدعم الفني</h1>

    <p>
      إذا واجهتك أي مشكلة أو كان لديك أي استفسار بخصوص التطبيق،
      يمكنك التواصل معنا عبر البريد الإلكتروني التالي:
    </p>

    <div class="email-container">

      <a
        id="supportEmail"
        class="email-link"
        href="mailto:mohamedhashimrezk73@gmail.com">
        mohamedhashimrezk73@gmail.com
      </a>

      <button class="copy-btn" onclick="copyEmail()">
        نسخ البريد
      </button>

    </div>

    <p>
      سنقوم بالرد عليك في أقرب وقت ممكن.
    </p>

  </div>

  <script>
    function copyEmail() {

      const email =
        document.getElementById('supportEmail').textContent;

      navigator.clipboard.writeText(email)
        .then(() => {
          alert('تم نسخ البريد الإلكتروني');
        })
        .catch(() => {
          alert('حدث خطأ أثناء النسخ');
        });
    }
  </script>

</body>
</html>
